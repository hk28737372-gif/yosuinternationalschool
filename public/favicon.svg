<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- White circular background for the favicon to look crisp on dark & light browser tabs -->
  <circle cx="300" cy="300" r="290" fill="#FFFFFF" />
  
  <g transform="translate(0, 50)">
    <!-- Top Arch Lines -->
    <path d="M 120,185 A 170,170 0 0,1 480,185" fill="none" stroke="#0A2540" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 145,210 A 140,140 0 0,1 455,210" fill="none" stroke="#0A2540" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Y O S U Text precisely balanced along the curve -->
    <g font-family="'Cinzel', 'Playfair Display', 'Georgia', serif" font-weight="900" font-size="44" fill="#0A2540">
      <text x="175" y="155" transform="rotate(-36, 175, 155)" text-anchor="middle">Y</text>
      <text x="240" y="112" transform="rotate(-12, 240, 112)" text-anchor="middle">O</text>
      <text x="360" y="112" transform="rotate(12, 360, 112)" text-anchor="middle">S</text>
      <text x="425" y="155" transform="rotate(36, 425, 155)" text-anchor="middle">U</text>
    </g>
    
    <!-- Central Shield/Semi-Circle with radiating background -->
    <g id="central-shield">
      <path d="M 180,260 A 120,120 0 0,1 420,260 Z" fill="#0A2540" />
      <g stroke="#1E3A8A" stroke-width="1.5" opacity="0.30">
        <line x1="300" y1="260" x2="300" y2="140" />
        <line x1="300" y1="260" x2="210" y2="180" />
        <line x1="300" y1="260" x2="390" y2="180" />
        <line x1="300" y1="260" x2="250" y2="150" />
        <line x1="300" y1="260" x2="350" y2="150" />
      </g>
      <path d="M 195,240 Q 300,170 405,240" fill="none" stroke="#102A43" stroke-width="8" opacity="0.4" />
      <path d="M 210,250 Q 300,200 390,250" fill="none" stroke="#102A43" stroke-width="8" opacity="0.4" />
    </g>

    <!-- Central Gold Badge/Circle -->
    <circle cx="300" cy="235" r="55" fill="#C5A059" />
    <circle cx="300" cy="235" r="48" fill="none" stroke="#0A2540" stroke-width="2.5" />
    
    <text x="300" y="222" font-family="'Cinzel', 'Playfair Display', 'Georgia', serif" font-weight="900" font-size="34" fill="#0A2540" text-anchor="middle">Y</text>
    <circle cx="300" cy="192" r="3.5" fill="#0A2540" />
    
    <g id="mini-book" fill="#0A2540">
      <path d="M 300,248 C 290,243 278,245 270,249 L 270,261 C 278,257 290,255 300,260 Z" />
      <path d="M 300,248 C 310,243 322,245 330,249 L 330,261 C 322,257 310,255 300,260 Z" />
      <line x1="300" y1="248" x2="300" y2="260" stroke="#C5A059" stroke-width="1.5" />
    </g>

    <!-- Giant Wings / Book Pages below -->
    <path d="M 300,255 C 230,225 180,240 120,270 C 180,295 240,290 300,295 Z" fill="#C5A059" stroke="#9A7B43" stroke-width="1" />
    <path d="M 300,255 C 370,225 420,240 480,270 C 420,295 360,290 300,295 Z" fill="#C5A059" stroke="#9A7B43" stroke-width="1" />

    <path d="M 300,270 C 200,230 100,255 35,325 C 120,312 210,305 300,298 Z" fill="#0A2540" />
    <path d="M 300,270 C 400,230 500,255 565,325 C 480,312 390,305 300,298 Z" fill="#0A2540" />
    <path d="M 300,270 L 300,298" stroke="#C5A059" stroke-width="3" stroke-linecap="round" />

    <!-- Bottom Label -->
    <text x="300" y="415" font-family="'Montserrat', 'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="34" fill="#0A2540" text-anchor="middle" letter-spacing="1.5">INTERNATIONAL SCHOOL</text>
  </g>
</svg>
