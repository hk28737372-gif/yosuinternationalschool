<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Outer circular border to keep it beautifully cropped in the browser tab -->
  <circle cx="250" cy="250" r="240" fill="#FFFFFF" />
  <circle cx="250" cy="250" r="232" fill="none" stroke="#0B2545" stroke-width="6" />
  
  <!-- Curved path for arched YOSU text -->
  <path id="yosuArch" d="M 85,250 A 165,165 0 0,1 415,250" fill="none" stroke="none" />
  <!-- Curved line under YOSU text -->
  <path d="M 125,205 A 135,135 0 0,1 375,205" fill="none" stroke="#0B2545" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Text YOSU arching over the top -->
  <text font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="900" font-size="52" fill="#0B2545" letter-spacing="24" text-anchor="middle">
    <textPath href="#yosuArch" startOffset="50%">YOSU</textPath>
  </text>
  
  <!-- Central Emblem Shield -->
  <circle cx="250" cy="235" r="75" fill="#0B2545" />
  <circle cx="250" cy="235" r="67" fill="none" stroke="#C5A059" stroke-width="3" />
  
  <!-- "Y" character inside circle -->
  <text x="250" y="215" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="900" font-size="36" fill="#C5A059" text-anchor="middle">Y</text>
  
  <!-- Book pages inside circle -->
  <!-- Left page -->
  <path d="M 215,242 C 228,237 238,242 245,247 L 245,263 C 238,258 228,253 215,258 Z" fill="#C5A059" />
  <!-- Right page -->
  <path d="M 285,242 C 272,237 262,242 255,247 L 255,263 C 262,258 272,253 285,258 Z" fill="#C5A059" />
  <!-- Spine -->
  <line x1="250" y1="247" x2="250" y2="263" stroke="#0B2545" stroke-width="2.5" />

  <!-- Background Sand/Gold Wings -->
  <!-- Left wing behind -->
  <path d="M 250,265 C 190,230 145,240 100,270 L 160,295 C 200,275 235,270 250,270 Z" fill="#C5A059" opacity="0.95" />
  <!-- Right wing behind -->
  <path d="M 250,265 C 310,230 355,240 400,270 L 340,295 C 300,275 265,270 250,270 Z" fill="#C5A059" opacity="0.95" />

  <!-- Main Navy Blue Book Wings (Foreground) -->
  <!-- Left wing -->
  <path d="M 250,278 C 170,250 80,270 20,335 C 100,320 180,312 250,305 Z" fill="#0B2545" />
  <!-- Right wing -->
  <path d="M 250,278 C 330,250 420,270 480,335 C 400,320 320,312 250,305 Z" fill="#0B2545" />
  
  <!-- Spine divider -->
  <path d="M 250,278 L 250,305" stroke="#C5A059" stroke-width="3.5" stroke-linecap="round" />

  <!-- Bottom Label -->
  <text x="250" y="420" font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="900" font-size="34" fill="#0B2545" text-anchor="middle" letter-spacing="2">INTERNATIONAL SCHOOL</text>
</svg>
